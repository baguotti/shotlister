<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Shotlister — Offline PWA shot list manager for film production">
<title>Shotlister</title>
<script>
{
  const cs = localStorage.getItem('sl-color-scheme');
  if (cs) document.querySelector('meta[name="color-scheme"]').content = cs;
}
</script>
<style>
/* ── Reset & Base ──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 4px;
  --row-h: 44px;
  --gap: 2px;

  /* Dark palette (default) */
  --bg-0: #0e0f11;
  --bg-1: #16181c;
  --bg-2: #1e2026;
  --bg-3: #282a30;
  --border: #2e3038;
  --text-0: #e8e8ec;
  --text-1: #a8a8b0;
  --text-2: #6e6e78;
  --accent: #6c8cff;
  --accent-dim: #3a4a80;
  --green: #4ae08a;
  --yellow: #f0c040;
  --orange: #e88040;
  --red: #e85050;
  --blue: #50a0e8;
  --priority-low: #6c8cff;
  --priority-high: #e85050;
  --card-bg: #1a1c22;
  --scrollbar-thumb: #3a3c44;
  --scrollbar-track: #16181c;
  --overrun-bg: rgba(232, 80, 80, 0.15);

  color-scheme: dark;
  scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
}

:root[data-theme="light"] {
  --bg-0: #f4f4f6;
  --bg-1: #ffffff;
  --bg-2: #eaeaee;
  --bg-3: #d8d8de;
  --border: #ccccdd;
  --text-0: #1a1a22;
  --text-1: #555560;
  --text-2: #888898;
  --accent: #4466dd;
  --accent-dim: #b0bce8;
  --green: #28a060;
  --yellow: #b89020;
  --orange: #c06020;
  --red: #c03030;
  --blue: #3080c0;
  --priority-low: #4466dd;
  --priority-high: #c03030;
  --card-bg: #fff;
  --scrollbar-thumb: #c0c0cc;
  --scrollbar-track: #f0f0f4;
  --overrun-bg: rgba(192, 48, 48, 0.12);

  color-scheme: light;
  scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.4;
  background: var(--bg-0);
  color: var(--text-0);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar fallback ─────────────────────────── */
@supports not (scrollbar-color: auto) {
  .table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--scrollbar-track); }
}

/* ── Layout ────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Toolbar ───────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 100;
  min-height: 48px;
}

.toolbar .project-title {
  font-family: var(--font-mono);
  font-weight: 600;
  background: none;
  border: 1px solid transparent;
  color: var(--text-0);
  padding: 4px 8px;
  border-radius: var(--radius);
  outline: none;
  /* width is constrained by flex; font-size is set by JS */
  white-space: nowrap;
  overflow: hidden;
  max-width: 320px;
  min-width: 80px;
  cursor: text;
  transition: border-color .15s;
  line-height: 1.2;
}
.toolbar .project-title:hover { border-color: var(--border); }
.toolbar .project-title:focus { border-color: var(--accent); }
.toolbar .project-title:empty::before {
  content: 'Untitled Project';
  color: var(--text-2);
  pointer-events: none;
}

/* ── Preset segmented control ───────────────────── */
.preset-ctrl {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  flex-shrink: 0;
}
.preset-ctrl button {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  border: none;
  background: var(--bg-2);
  color: var(--text-2);
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.preset-ctrl button:last-child { border-right: none; }
.preset-ctrl button:hover { background: var(--bg-3); color: var(--text-0); }
.preset-ctrl button.active { background: var(--accent-dim); color: var(--text-0); }

/* (col/row drag-resize removed — presets use proportional scale instead) */

.toolbar .spacer { flex: 1; min-width: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-2);
  color: var(--text-1);
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
  user-select: none;
}
.btn:hover { background: var(--bg-3); color: var(--text-0); border-color: var(--accent-dim); }
.btn.active { background: var(--accent-dim); color: var(--text-0); border-color: var(--accent); }

/* ── Timeline Bar ──────────────────────────────── */
.timeline-bar {
  display: flex;
  align-items: center;
  height: 24px;
  padding: 0 12px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 0;
  overflow: hidden;
}

.timeline-inner {
  display: flex;
  flex: 1;
  height: 14px;
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg-3);
  position: relative;
}

.tl-block {
  height: 100%;
  min-width: 2px;
  position: relative;
  transition: opacity .15s;
  cursor: default;
  border-right: 1px solid var(--bg-0);
}
.tl-block:last-child { border-right: none; }
.tl-block:hover { opacity: .8; }

.tl-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 6px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-0);
  white-space: nowrap;
  z-index: 50;
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.tl-block:hover .tl-tooltip { display: block; }

.timeline-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-right: 8px;
  flex-shrink: 0;
}

.timeline-times {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-2);
  margin-left: 8px;
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── Filter Bar ────────────────────────────────── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-bar select, .filter-bar input[type="text"] {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-2);
  color: var(--text-0);
  outline: none;
  min-width: 90px;
}
.filter-bar select:focus, .filter-bar input:focus {
  border-color: var(--accent);
}
.filter-bar label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* ── Table ─────────────────────────────────────── */
.table-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 1400px;
}

thead {
  position: sticky;
  top: 0;
  z-index: 20;
}

thead th {
  background: var(--bg-1);
  border-bottom: 2px solid var(--border);
  padding: 6px 8px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-2);
  white-space: nowrap;
  user-select: none;
  position: sticky;
  top: 0;
}

/* Column widths */
.col-drag { width: 28px; }
.col-storyboard { width: 68px; transition: width 0.15s; }
.col-num, .col-shotnum { width: 40px; }
.col-priority { width: 74px; }
.col-location { width: 100px; }
.col-notes { width: auto; min-width: 120px; }
.col-chars { width: 100px; }
.col-shotsize { width: 72px; }
.col-lens { width: 62px; }
.col-movement { width: 90px; }
.col-props { width: 80px; }
.col-duration { width: 60px; }
.col-calltime { width: 60px; }
.col-endtime { width: 60px; }
.col-overrun { width: 60px; }
.col-running { width: 60px; }
.col-actions { width: 30px; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:hover { background: var(--bg-2); }
tbody tr.dragging { opacity: .4; }
tbody tr.drag-over { border-top: 2px solid var(--accent); }

td {
  padding: 4px 6px;
  vertical-align: middle;
  font-size: 12px;
  color: var(--text-0);
  position: relative;
}

/* Location group header */
tr.location-group {
  background: var(--bg-2);
}
tr.location-group td {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  padding: 6px 12px;
  letter-spacing: .5px;
}
tr.location-subtotal td {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
  background: var(--bg-2);
  padding: 3px 12px;
  border-top: 1px dashed var(--border);
}

/* Editable cells */
td[contenteditable="true"] {
  outline: none;
  cursor: text;
  border-radius: 2px;
  transition: background .1s;
  white-space: pre-wrap;
  word-break: break-word;
}
td[contenteditable="true"]:focus {
  background: var(--bg-3);
  box-shadow: inset 0 0 0 1px var(--accent);
}

/* Drag handle */
.drag-handle {
  cursor: grab;
  color: var(--text-2);
  font-size: 14px;
  text-align: center;
  user-select: none;
  opacity: .5;
  transition: opacity .15s;
  border-left: 4px solid transparent;
}
.drag-handle:hover { opacity: 1; }

/* Scene number */
.scene-num, .shot-num {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-1);
  text-align: center;
}

/* Priority dot */
.priority-dot {
  display: block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 auto;
  cursor: pointer;
  transition: transform .15s, background .15s;
  background: var(--bg-3);
  border: 1px solid var(--border);
}
.priority-dot:hover { transform: scale(1.3); }
.priority-dot[data-p="low"] { background: var(--priority-low); border-color: var(--priority-low); }
.priority-dot[data-p="high"] { background: var(--priority-high); border-color: var(--priority-high); }

/* Storyboard thumbnail */
.storyboard-cell {
  text-align: center;
  cursor: pointer;
}
.storyboard-cell .sb-thumb-wrap {
  position: relative;
  display: inline-block;
  line-height: 0;
}
.storyboard-cell img {
  max-width: 56px;
  max-height: 36px;
  border-radius: 3px;
  object-fit: cover;
  border: 1px solid var(--border);
  transition: opacity .15s;
  display: block;
}
.storyboard-cell .sb-thumb-wrap::after {
  content: '⤢';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 15px;
  border-radius: 3px;
  opacity: 0;
  transition: opacity .15s;
}
.storyboard-cell:hover .sb-thumb-wrap::after { opacity: 1; }
.storyboard-cell:hover img { opacity: 0.85; }
.storyboard-cell .placeholder {
  width: 56px;
  height: 36px;
  border: 1px dashed var(--border);
  border-radius: 3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: 16px;
  transition: border-color .15s, color .15s;
}
.storyboard-cell:hover .placeholder {
  border-color: var(--accent);
  color: var(--accent);
}

/* Shot type select */
td select {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 4px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-0);
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
}
td select:hover { border-color: var(--border); }
td select:focus { border-color: var(--accent); background: var(--bg-3); }

/* Duration / Time inputs */
.duration-input, .time-input {
  font-family: var(--font-mono);
  font-size: 11px;
  width: 100%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-0);
  padding: 3px 4px;
  border-radius: var(--radius);
  outline: none;
  text-align: center;
}
.duration-input:hover, .time-input:hover { border-color: var(--border); }
.duration-input:focus, .time-input:focus { border-color: var(--accent); background: var(--bg-3); }
.duration-input.invalid, .time-input.invalid { border-color: var(--red); color: var(--red); }

/* End time (read-only) */
.end-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  text-align: center;
}

/* Overrun cell */
.overrun-cell {
  font-family: var(--font-mono);
  font-size: 10px;
  text-align: center;
  font-weight: 600;
}
.overrun-cell.has-overrun {
  color: var(--red);
  background: var(--overrun-bg);
  border-radius: 2px;
}

/* Call time — auto-inherited indicator */
.time-input.inherited {
  color: var(--text-2);
  font-style: italic;
}

/* Running time */
.running-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  text-align: center;
}

/* Actions (context menu trigger) */
.actions-btn {
  background: none;
  border: none;
  color: var(--text-2);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: var(--radius);
  transition: background .1s, color .1s;
}
.actions-btn:hover { background: var(--bg-3); color: var(--text-0); }

/* Context menu */
.context-menu {
  position: fixed;
  z-index: 1000;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 0;
  min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  display: none;
}
.context-menu.visible { display: block; }
.context-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 14px;
  border: none;
  background: none;
  color: var(--text-0);
  font-size: 12px;
  font-family: var(--font-mono);
  cursor: pointer;
}
.context-menu button:hover { background: var(--bg-3); }
.context-menu button.danger { color: var(--red); }
.context-menu .divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Footer ────────────────────────────────────── */
.footer {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  z-index: 100;
  flex-wrap: wrap;
}
.footer .stat { display: flex; align-items: center; gap: 4px; }
.footer .stat-val { color: var(--text-0); font-weight: 600; }
.footer .stat-val.overrun-val { color: var(--red); }
.footer .stat-sep {
  width: 1px;
  height: 14px;
  background: var(--border);
  flex-shrink: 0;
}
.footer .spacer { flex: 1; }
.add-row-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.add-row-btn:hover { background: var(--bg-3); border-color: var(--accent); }

/* ── Card View ─────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  padding: 12px;
  overflow: auto;
  flex: 1;
}

.shot-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
}
.shot-card:hover { border-color: var(--accent-dim); box-shadow: 0 4px 16px rgba(0,0,0,.2); }

.shot-card .card-img {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  font-size: 28px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}
.shot-card .card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.shot-card .card-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.shot-card .card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.shot-card .card-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
}

.shot-card .card-type {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg-3);
  color: var(--text-1);
}

.shot-card .card-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-1);
}

.shot-card .card-label {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-2);
}

.shot-card .card-notes {
  font-size: 11px;
  color: var(--text-1);
  line-height: 1.3;
  word-break: break-word;
}

.shot-card .card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
}

.shot-card .card-schedule {
  display: flex;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
  padding: 4px 10px;
  border-top: 1px solid var(--border);
  background: var(--bg-2);
}
.shot-card .card-schedule .cs-overrun {
  color: var(--red);
  font-weight: 600;
}

/* ── Mobile: swipe-to-delete ───────────────────── */
.swipe-container {
  position: relative;
  overflow: hidden;
}
.swipe-delete-bg {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 80px;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  opacity: 0;
  transition: opacity .15s;
}

/* ── Responsive ────────────────────────────────── */
@media (max-width: 768px) {
  .toolbar { padding: 6px 8px; gap: 6px; }
  .toolbar .project-title { font-size: 13px; min-width: 100px; }
  .filter-bar { padding: 4px 8px; }
  table { min-width: 1000px; }
  .card-grid { grid-template-columns: 1fr; gap: 8px; padding: 8px; }
  .col-props { width: 0; overflow: hidden; padding: 0; }
  .hide-tablet { display: none; }
}

@media (max-width: 480px) {
  table { min-width: 700px; }
  .btn { font-size: 10px; padding: 4px 7px; }
  .hide-mobile { display: none; }
}

/* Hidden utility */
.hidden { display: none !important; }

/* File input hidden */
input[type="file"].sr-only {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

/* ── Blocks ────────────────────────────────────── */
.block-row td {
  background: var(--bg-1);
}

<script>
(function() {
  'use strict';

  // ── Constants ──────────────────────────────────
  const MOVEMENT_TYPES = ['STATIC','HANDHELD','DOLLY','CRANE','DRONE'];
  const SHOT_SIZES = ['ECU','CU','MCU','MS','WIDE','EWS'];
  const LENS_OPTIONS = ['18mm','24mm','35mm','50mm','85mm'];
  const PRIORITY_CYCLE = ['off','low','high'];
  const LS_KEY = 'sl-data';
  const LS_TITLE_KEY = 'sl-title';
  const LS_PROJECTS_KEY = 'sl-projects';
  const LS_LAST_PROJ_KEY = 'sl-last-project';
  const LS_THEME_KEY = 'sl-color-scheme';
  const LS_PRESET_KEY = 'sl-preset';
  
  const LS_AC_CHARS = 'sl-ac-characters';
  const LS_AC_LOCS = 'sl-ac-location';
  const LS_AC_PROPS = 'sl-ac-props';
  const LS_AC_SHOTSIZE = 'sl-ac-shotsize';
  const LS_AC_LENS = 'sl-ac-lens';
  const LS_AC_MOVEMENT = 'sl-ac-movement';
  
  const TOTAL_COLS = 18;

  // Presets: proportional scale factors (M = 1.0 baseline).
  // Actual px values are computed live from the container height.
  const PRESETS = {
    S:  { scale: 0.55 },
    M:  { scale: 1.0  },
    L:  { scale: 1.55 },
    XL: { scale: 2.3  },
  };
  const BASE_ROW_FACTOR = 0.088; // fraction of tableWrap height for M preset

  const SCENE_COLORS = [
    '#8b5cf6', '#ec4899', '#f43f5e', '#f97316',
    '#eab308', '#84cc16', '#10b981', '#06b6d4',
    '#3b82f6', '#6366f1', '#14b8a6', '#f59e0b'
  ];
  const SCENE_BGS = [
    'rgba(139, 92, 246, 0.12)', 'rgba(236, 72, 153, 0.12)', 'rgba(244, 63, 94, 0.12)', 'rgba(249, 115, 22, 0.12)',
    'rgba(234, 179, 8, 0.12)', 'rgba(132, 204, 22, 0.12)', 'rgba(16, 185, 129, 0.12)', 'rgba(6, 182, 212, 0.12)',
    'rgba(59, 130, 246, 0.12)', 'rgba(99, 102, 241, 0.12)', 'rgba(20, 184, 166, 0.12)', 'rgba(245, 158, 11, 0.12)'
  ];

  function getSceneGroup(numStr) {
    if (!numStr) return null;
    const match = String(numStr).match(/^(\d+)/);
    if (!match) return null;
    const num = parseInt(match[1], 10);
    const idx = Math.abs(num - 1) % SCENE_COLORS.length;
    return { numStr: match[1], border: SCENE_COLORS[idx], bg: SCENE_BGS[idx] };
  }

  // ── State ──────────────────────────────────────
  let projectsList = [];
  let currentProjectId = null;
  let shots = [];
  let viewMode = 'list'; // 'list' | 'card'
  const GROUP_MODES = ['none', 'location', 'movement', 'scene'];
  let currentGroupMode = 'none';
  let contextRowId = null;
  let dragSrcId = null;
  let currentStoryboardId = null;
  let lbShotIds = [];   // shots with images, in current rendered order
  let lbIndex   = -1;   // current index in lbShotIds

  let currentPreset = 'M'; // active preset key

  let acSets = {
    characters: new Set(),
    location: new Set(),
    props: new Set(),
    shotSize: new Set(),
    lens: new Set(),
    movement: new Set()
  };

  // Computed schedule — populated by cascadeSchedule()
  // Map of shot id → { callMin, endMin, overrunMin, isInherited }
  let scheduleMap = {};
  let groupTotals = {};

  // ── DOM refs ───────────────────────────────────
  const $ = id => document.getElementById(id);
  const projectTitle = $('projectTitle');
  const shotBody = $('shotBody');
  const cardGrid = $('cardGrid');
  const tableWrap = $('tableWrap');
  const contextMenu = $('contextMenu');
  const fileInput = $('fileInput');
  const filterLocation = $('filterLocation');
  const filterCharacter = $('filterCharacter');
  const filterPriority = $('filterPriority');
  const lightbox    = $('lightbox');
  const lbImg       = $('lbImg');
  const lbLabel     = $('lbLabel');
  const lbClose     = $('lbClose');
  const lbPrev      = $('lbPrev');
  const lbNext      = $('lbNext');
  const lbBackdrop  = $('lbBackdrop');
  const lbReplace   = $('lbReplace');
  const lbDelete    = $('lbDelete');

  // ── Title Auto-Resize ──────────────────────────
  // Binary-search the largest font-size that keeps text in one line.
  const TITLE_MIN = 13;
  const TITLE_MAX = 28;

  function fitTitleFont() {
    const el = projectTitle;
    let lo = TITLE_MIN, hi = TITLE_MAX, best = TITLE_MIN;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      el.style.fontSize = mid + 'px';
      if (el.scrollWidth <= el.offsetWidth) {
        best = mid; lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    el.style.fontSize = best + 'px';
  }

  // Observe width changes (toolbar resize)
  new ResizeObserver(fitTitleFont).observe(projectTitle);
  projectTitle.addEventListener('input', fitTitleFont);

  // ── Responsive Preset Layout ───────────────────
  // Sizes are derived from the live tableWrap height × preset scale,
  // so they reflow automatically when the window is resized.
  function computePresetSizes() {
    const ch = tableWrap.clientHeight || Math.round(window.innerHeight * 0.65);
    const scale = PRESETS[currentPreset].scale;
    const rowH  = Math.max(30, Math.round(ch * BASE_ROW_FACTOR * scale));
    const thumbSz = Math.max(20, Math.min(rowH - 6, Math.round(rowH * 0.78)));
    return { rowH, thumbSz };
  }

  function applyPresetLayout() {
    if (viewMode !== 'list') return;
    const { rowH, thumbSz } = computePresetSizes();
    
    // Use a 1.6 aspect ratio for width so thumbnails are appropriately cinematic and much larger
    const thumbW = Math.round(thumbSz * 1.6);
    
    // Auto-expand storyboard column to fit thumbnail
    const storyboardCol = document.querySelector('.col-storyboard');
    if (storyboardCol) storyboardCol.style.width = Math.max(68, thumbW + 12) + 'px';

    shotBody.querySelectorAll('tr[data-id]').forEach(tr => {
      const isBlock = tr.classList.contains('block-row');
      tr.style.height = (isBlock ? Math.max(30, Math.round(rowH * 0.7)) : rowH) + 'px';
      const thumb = tr.querySelector('.storyboard-cell img, .storyboard-cell .placeholder');
      if (thumb) {
        if (thumb.tagName === 'IMG') {
          thumb.style.maxWidth  = thumbW + 'px';
          thumb.style.maxHeight = thumbSz + 'px';
        } else {
          thumb.style.width  = thumbW + 'px';
          thumb.style.height = thumbSz + 'px';
        }
      }
    });
  }

  // ── Preset Control ─────────────────────────────
  function applyPreset(key) {
    currentPreset = key;
    document.querySelectorAll('#presetCtrl button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.preset === key);
    });
    applyPresetLayout();
    saveLayout();
  }

  // Duration: "HH:MM" → total minutes (0 if empty, -1 if invalid)
  function parseDuration(s) {
    if (!s) return 0;
    const m = s.match(/^(\d{1,2}):([0-5]\d)$/);
    return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : -1;
  }

  // Takes total minutes, returns "HH:MM"
  function formatDuration(totalMin) {
    if (totalMin < 0) return '--:--';
    const h = Math.floor(totalMin / 60);
    const m = Math.round(totalMin % 60);
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function isValidDuration(s) {
    if (!s) return true;
    return /^\d{1,2}:[0-5]\d$/.test(s);
  }

  // Normalize raw duration input → "HH:MM".
  // Accepts: "30" → "00:30", "130" → "01:30", "0030" → "00:30", "1:30" → "01:30"
  function normalizeDuration(raw) {
    if (!raw) return '';
    if (/^\d{1,2}:[0-5]\d$/.test(raw)) {
      const [hh, mm] = raw.split(':');
      return String(parseInt(hh, 10)).padStart(2, '0') + ':' + mm;
    }
    const digits = raw.replace(/\D/g, '');
    if (!digits) return '';
    let h, m;
    if (digits.length <= 2)      { h = 0;                         m = parseInt(digits, 10); }
    else if (digits.length === 3){ h = parseInt(digits[0], 10);   m = parseInt(digits.slice(1), 10); }
    else                         { m = parseInt(digits.slice(-2), 10); h = parseInt(digits.slice(0, -2), 10); }
    if (m > 59) { h += Math.floor(m / 60); m = m % 60; }
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  // Normalize raw wall-clock input → "HH:MM" (clamped to 23:59).
  function normalizeTime(raw) {
    if (!raw) return '';
    if (/^([01]?\d|2[0-3]):[0-5]\d$/.test(raw)) {
      const [hh, mm] = raw.split(':');
      return String(parseInt(hh, 10)).padStart(2, '0') + ':' + mm;
    }
    const digits = raw.replace(/\D/g, '');
    if (!digits) return '';
    let h, m;
    if (digits.length <= 2)      { h = 0;                         m = parseInt(digits, 10); }
    else if (digits.length === 3){ h = parseInt(digits[0], 10);   m = parseInt(digits.slice(1), 10); }
    else                         { m = parseInt(digits.slice(-2), 10); h = parseInt(digits.slice(0, -2), 10); }
    if (m > 59) m = 59;
    if (h > 23) h = 23;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  // Time-of-day: "HH:MM" → minutes since midnight (-1 if invalid)
  function parseTime(s) {
    if (!s) return -1;
    const m = s.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
    return m ? parseInt(m[1])*60 + parseInt(m[2]) : -1;
  }

  function formatTime(totalMin) {
    if (totalMin < 0) return '--:--';
    const h = Math.floor(totalMin / 60) % 24;
    const m = totalMin % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }

  function isValidTime(s) {
    if (!s) return true;
    return /^([01]?\d|2[0-3]):[0-5]\d$/.test(s);
  }

  // Takes overrun in minutes, returns "+HH:MM"
  function formatOverrun(totalMin) {
    if (totalMin <= 0) return '';
    const h = Math.floor(totalMin / 60);
    const m = Math.round(totalMin % 60);
    return '+' + String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  // ── Schedule Computation ───────────────────────
  // Duration is now HH:MM (hours:minutes); all schedule values in minutes.
  function cascadeSchedule() {
    scheduleMap = {};
    groupTotals = {};
    let prevEndMin = -1;

    for (let i = 0; i < shots.length; i++) {
      const s = shots[i];
      const durMin = parseDuration(s.duration); // already in minutes

      const group = getSceneGroup(s.num);
      if (group) {
        if (!groupTotals[group.numStr]) groupTotals[group.numStr] = { min: 0, color: group.border, bg: group.bg };
        if (durMin > 0) groupTotals[group.numStr].min += durMin;
      }

      let callMin = -1;
      let isInherited = false;

      if (s.callTime && isValidTime(s.callTime)) {
        callMin = parseTime(s.callTime);
      } else if (prevEndMin >= 0) {
        callMin = prevEndMin;
        isInherited = true;
      }

      let endMin = -1;
      if (callMin >= 0 && durMin > 0) {
        endMin = callMin + durMin;
      } else if (callMin >= 0) {
        endMin = callMin;
      }

      scheduleMap[s.id] = { callMin, endMin, overrunMin: 0, isInherited };

      if (endMin >= 0) prevEndMin = endMin;
    }

    // Second pass: compute overruns (in minutes)
    for (let i = 0; i < shots.length - 1; i++) {
      const cur  = scheduleMap[shots[i].id];
      const next = scheduleMap[shots[i + 1].id];
      if (cur.endMin >= 0 && next.callMin >= 0 && !next.isInherited) {
        const delta = cur.endMin - next.callMin;
        if (delta > 0) cur.overrunMin = delta;
      }
    }
  }

  // ── Autocomplete ───────────────────────────────
  function loadAutocomplete() {

      if (props) acSets.props = new Set(JSON.parse(props));
      if (shotSize) acSets.shotSize = new Set(JSON.parse(shotSize));
      if (lens) acSets.lens = new Set(JSON.parse(lens));
      if (movement) acSets.movement = new Set(JSON.parse(movement));

  function saveAutocomplete() {
    try {
      localStorage.setItem(LS_AC_CHARS, JSON.stringify([...acSets.characters]));
      localStorage.setItem(LS_AC_LOCS, JSON.stringify([...acSets.location]));
      localStorage.setItem(LS_AC_PROPS, JSON.stringify([...acSets.props]));
      localStorage.setItem(LS_AC_SHOTSIZE, JSON.stringify([...acSets.shotSize]));
      localStorage.setItem(LS_AC_LENS, JSON.stringify([...acSets.lens]));
      localStorage.setItem(LS_AC_MOVEMENT, JSON.stringify([...acSets.movement]));
    } catch(e) {}
  }

  function extractAutocompleteValues() {
    let changed = false;
    shots.forEach(s => {
      if (s.location) {
        const val = s.location.trim();
        if (val && !acSets.location.has(val)) { acSets.location.add(val); changed = true; }
      }
      if (s.characters) {
        s.characters.split(',').forEach(part => {
          const val = part.trim();
          if (val && !acSets.characters.has(val)) { acSets.characters.add(val); changed = true; }
        });
      }
      if (s.props) {
        s.props.split(',').forEach(part => {
          const val = part.trim();
          if (val && !acSets.props.has(val)) { acSets.props.add(val); changed = true; }
        });
      }
      // Custom dropdown values
      if (s.shotSize && !SHOT_SIZES.includes(s.shotSize)) {
        if (!acSets.shotSize.has(s.shotSize)) { acSets.shotSize.add(s.shotSize); changed = true; }
      }
      if (s.lens && !LENS_OPTIONS.includes(s.lens)) {
        if (!acSets.lens.has(s.lens)) { acSets.lens.add(s.lens); changed = true; }
      }
      if (s.movement && !MOVEMENT_TYPES.includes(s.movement)) {
        if (!acSets.movement.has(s.movement)) { acSets.movement.add(s.movement); changed = true; }
      }
    });
    if (changed) saveAutocomplete();
  }

  function migrateLegacyData() {
    try {
      const p = localStorage.getItem(LS_PROJECTS_KEY);
      if (p) projectsList = JSON.parse(p);
    } catch(e) {}
    
    const raw = localStorage.getItem(LS_KEY);
    if (raw && projectsList.length === 0) {
      const oldTitle = localStorage.getItem(LS_TITLE_KEY) || 'Legacy Project';
      const pid = uid();
      localStorage.setItem('sl-project-' + pid, raw);
      let legacyShots = [];
      try { legacyShots = JSON.parse(raw); } catch(e){}
      projectsList.push({ id: pid, title: oldTitle, updatedAt: Date.now(), count: legacyShots.length });
      saveProjects();
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_TITLE_KEY);
    }
  }

  function save() {
    if (!currentProjectId) return;
    try {
      localStorage.setItem('sl-project-' + currentProjectId, JSON.stringify(shots));
      const p = projectsList.find(x => x.id === currentProjectId);
      if (p) {
        p.title = projectTitle.textContent.trim() || 'Untitled Project';

        p.count = shots.length;
        saveProjects();

  // ── Filtering ──────────────────────────────────
  function getFilteredShots() {
    let result = shots;
    const loc = filterLocation.value;
    const chr = filterCharacter.value.trim().toLowerCase();
    const pri = filterPriority.value;

    if (loc) result = result.filter(s => s.location === loc);
    if (chr) result = result.filter(s => s.characters.toLowerCase().includes(chr));
    if (pri) result = result.filter(s => s.priority === pri);

    return result;
  }

      locs.map(l => `<option value="${esc(l)}"${l===cur?' selected':''}>${esc(l)}</option>`).join('');

  // ── Timeline Bar ───────────────────────────────
  function renderTimeline() {
    const inner = $('timelineInner');
    const times = $('timelineTimes');

    if (shots.length === 0) {
      inner.innerHTML = '';
      times.textContent = '';
      return;
    }

    const totalDurSec = shots.reduce((sum, s) => {
      const d = parseDuration(s.duration);
      return sum + (d > 0 ? d : 0);
    }, 0);

    if (totalDurSec === 0) {
      // Equal blocks
      const pct = 100 / shots.length;
      inner.innerHTML = shots.map(s => {
        const group = getSceneGroup(s.num);
        let title = s.kind === 'block' ? `${esc(s.blockType)}${s.label?' '+esc(s.label):''}` : `#${esc(s.num)} · ${esc(s.movement || '')}`;
        if (group && groupTotals[group.numStr]) {
          title += ` (Sc ${group.numStr} Total: ${formatDuration(groupTotals[group.numStr].min)})`;
        }
        const defaultBg = s.kind === 'block' ? 'var(--bg-2)' : '';
        const bg = group ? group.border : defaultBg;
        return `<div class="tl-block${s.kind==='block' ? ' block-type-'+s.blockType : ''}" style="width:${pct}%;${bg?'background:'+bg+' !important':''}">` +
        `<span class="tl-tooltip">${title}</span></div>`;
      }).join('');
    } else {
      inner.innerHTML = shots.map(s => {
        const d = parseDuration(s.duration);
        const sec = d > 0 ? d : 0;
        const pct = (sec / totalDurSec) * 100;
        const group = getSceneGroup(s.num);
        let title = s.kind === 'block' ? `${esc(s.blockType)}${s.label?' '+esc(s.label):''}` : `#${esc(s.num)} · ${esc(s.movement || '')}`;

        const durStr = s.duration || '--:--';
        title += ` · ${durStr}`;
        if (group && groupTotals[group.numStr]) {
          title += ` (Sc ${group.numStr} Total: ${formatDuration(groupTotals[group.numStr].min)})`;
        }
        const defaultBg = s.kind === 'block' ? (s.blockType==='PREP'?'var(--orange)':s.blockType==='BREAK'?'var(--green)':s.blockType==='LUNCH'?'var(--blue)':s.blockType==='TRAVEL'?'#a855f7':'var(--text-2)') : '';
        const bg = group ? group.border : defaultBg;
        return `<div class="tl-block" style="width:${Math.max(pct, 0.5)}%;${bg?'background:'+bg+' !important':''}">` +
          `<span class="tl-tooltip">${title}</span></div>`;
      }).join('');
    }

    // Show first call time → last end time
    const firstSched = scheduleMap[shots[0]?.id];
    const lastSched = scheduleMap[shots[shots.length - 1]?.id];
    const startStr = firstSched && firstSched.callMin >= 0 ? formatTime(firstSched.callMin) : '--:--';
    const endStr = lastSched && lastSched.endMin >= 0 ? formatTime(lastSched.endMin) : '--:--';
    times.textContent = startStr + ' → ' + endStr;
  }

  // ── Render: Table ──────────────────────────────
  function renderTable() {
    const filtered = getFilteredShots();
    
    // Compute shot numbers within each scene
    let sceneShotCounters = {};
    filtered.forEach(s => {
      if (s.kind === 'shot') {
        const sceneKey = getSceneGroup(s.num)?.numStr || s.num || '_';
        sceneShotCounters[sceneKey] = (sceneShotCounters[sceneKey] || 0) + 1;
        s._shotNum = sceneShotCounters[sceneKey];
      } else {
        s._shotNum = '';
      }
    });
    
    let html = '';
    let cumulative = 0;

    if (currentGroupMode !== 'none') {
      const groups = {};
      const order = [];
      filtered.forEach(s => {
        let key = '';
        if (currentGroupMode === 'location') {
          key = s.location || '(No Location)';
        } else if (currentGroupMode === 'movement') {
          key = s.kind === 'block' ? 'Blocks' : (s.movement || '(No Movement)');
        } else if (currentGroupMode === 'scene') {
          const group = getSceneGroup(s.num);
          key = group ? `Scene ${group.numStr}` : '(No Scene)';
        }
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push(s);
      });

      order.forEach(key => {
        let icon = '';
        if (currentGroupMode === 'location') icon = '📍 ';
        else if (currentGroupMode === 'movement') icon = '&#x1F3A5; ';
        else if (currentGroupMode === 'scene') icon = '🎬 ';

        html += `<tr class="location-group"><td colspan="18">${icon}${esc(key)}</td></tr>`;
        let groupCum = 0;
        groups[key].forEach(s => {
          const dur = parseDuration(s.duration);
          if (dur > 0) { cumulative += dur; groupCum += dur; }
          html += s.kind === 'block' ? buildBlockRow(s, cumulative) : buildRow(s, cumulative);
        });
        html += `<tr class="location-subtotal"><td colspan="11"></td><td colspan="4" style="text-align:center">${groups[key].length} items · ${formatDuration(groupCum)}</td><td colspan="3"></td></tr>`;
      });
    } else {
      filtered.forEach(s => {
        const dur = parseDuration(s.duration);
        if (dur > 0) cumulative += dur;
        html += s.kind === 'block' ? buildBlockRow(s, cumulative) : buildRow(s, cumulative);
      });
    }

    shotBody.innerHTML = html;
    bindRowEvents();
    updateStats();
    updateLocationFilter();
  }


  // Build select options: base list + custom persisted values + "Custom…" sentinel
  function buildSelectOpts(baseOpts, acSet, currentVal) {
    const customOpts = [...acSet].filter(v => !baseOpts.includes(v)).sort();
    const allOpts = [...baseOpts, ...customOpts];
    return allOpts.map(t =>
      `<option value="${t}"${currentVal === t ? ' selected' : ''}>${t}</option>`
    ).join('') + `<option value="__custom__">Custom\u2026</option>`;
  }

  function buildRow(s, runTime) {

    const sched = scheduleMap[s.id] || { callMin: -1, endMin: -1, overrunSec: 0, isInherited: false };

    const callTimeVal = sched.isInherited ? formatTime(sched.callMin) : (s.callTime || '');
    const callValid = isValidTime(s.callTime);
    const inheritedClass = sched.isInherited ? ' inherited' : '';
    const endTimeStr = sched.endMin >= 0 ? formatTime(sched.endMin) : '--:--';
    const overrunStr = sched.overrunMin > 0 ? formatOverrun(sched.overrunMin) : '';
    const overrunClass = sched.overrunMin > 0 ? ' has-overrun' : '';

    const group = getSceneGroup(s.num);

      : '';

    return `<tr data-id="${s.id}" draggable="false" style="${rowStyle}">
      <td class="drag-handle" title="Drag to reorder" style="${borderStyle}">&#x2807;</td>
      <td class="storyboard-cell" data-id="${s.id}">${storyboardContent}</td>

      <td contenteditable="true" data-field="location">${esc(s.location)}</td>
      <td contenteditable="true" data-field="notes">${esc(s.notes)}</td>
      <td contenteditable="true" data-field="characters">${esc(s.characters)}</td>
      <td><select data-field="shotSize">${sizeOpts}</select></td>
      <td class="hide-tablet"><select data-field="lens">${lensOpts}</select></td>
      <td><select data-field="movement">${movOpts}</select></td>
      <td class="hide-tablet" contenteditable="true" data-field="props">${esc(s.props)}</td>
      <td><input class="duration-input${durValid ? '' : ' invalid'}" type="text" value="${esc(s.duration)}" placeholder="HH:MM" data-field="duration"></td>
      <td><div style="position:relative;display:flex;align-items:center;">

    return `<tr class="block-row block-type-${s.blockType}" data-id="${s.id}" draggable="false" style="${rowStyle}">

          <span contenteditable="true" data-field="label" class="block-label" data-placeholder="Label..." style="${s.blockType === 'CUSTOM' ? 'display:inline-block;' : 'display:none;'}">${esc(s.label || '')}</span>
        </div>
      </td>
      <td></td>
      <td></td>
      <td class="hide-tablet"></td>
      <td></td>
      <td class="hide-tablet"></td>
      <td><input class="duration-input${durValid ? '' : ' invalid'}" type="text" value="${esc(s.duration)}" placeholder="HH:MM" data-field="duration"></td>
      <td><div style="position:relative;display:flex;align-items:center;">
        <input class="time-input${callValid ? '' : ' invalid'}${inheritedClass}" type="text" value="${callTimeVal}" placeholder="HH:MM" data-field="callTime" data-inherited="${sched.isInherited}" style="padding-right: 18px;">
        ${pinIcon}
      </div></td>
      <td class="end-time">${endTimeStr}</td>
      <td class="overrun-cell${overrunClass}">${overrunStr}</td>
      <td class="running-time hide-tablet">${formatDuration(runTime)}</td>

  // ── Render: Cards ──────────────────────────────
  function renderCards() {
    const filtered = getFilteredShots();
    let html = '';

    filtered.forEach(s => {
      const imgContent = s.storyboard
        ? `<img src="${s.storyboard}" alt="storyboard">`
        : `<span style="font-size:32px;color:var(--text-2)">📷</span>`;

      const sched = scheduleMap[s.id] || { callMin: -1, endMin: -1, overrunMin: 0, isInherited: false };
      const callStr = sched.callMin >= 0 ? formatTime(sched.callMin) : '--:--';
      const endStr = sched.endMin >= 0 ? formatTime(sched.endMin) : '--:--';
      const overrunStr = sched.overrunMin > 0 ? formatOverrun(sched.overrunMin) : '';

      html += `<div class="shot-card" data-id="${s.id}">
        <div class="card-img" data-id="${s.id}">${imgContent}</div>
        <div class="card-body">

            <span class="card-num">#${esc(s.num)}</span>

          </div>
          ${s.characters ? `<div class="card-row"><span class="card-label">Characters</span> ${esc(s.characters)}</div>` : ''}
          ${s.location ? `<div class="card-row"><span class="card-label">Location</span> ${esc(s.location)}</div>` : ''}
          ${s.notes ? `<div class="card-notes">${esc(s.notes)}</div>` : ''}

  // ── Autocomplete UI ──────────────────────────────
  let acVisible = false;
  let acCurrentTarget = null;
  let acCurrentType = null;
  let acOptions = [];
  let acSelectedIndex = -1;
  let acHideTimeout = null;

  function showAutocomplete(td, type) {
    acCurrentTarget = td;
    acCurrentType = type;
    acVisible = true;
    $('acDropdown').classList.add('visible');
    filterAutocomplete();
  }

  function hideAutocomplete() {
    acVisible = false;
    acCurrentTarget = null;
    acCurrentType = null;
    $('acDropdown').classList.remove('visible');
  }

  function filterAutocomplete() {
    if (!acVisible || !acCurrentTarget || !acCurrentType) return;
    
    const rawText = acCurrentTarget.innerText || '';
    let searchTerm = rawText;
    let prefix = '';
    
    if (acCurrentType === 'characters' || acCurrentType === 'props') {
      const lastComma = rawText.lastIndexOf(',');
      if (lastComma !== -1) {
        prefix = rawText.substring(0, lastComma + 1);
        searchTerm = rawText.substring(lastComma + 1);
      }
    }
    
    searchTerm = searchTerm.trim().toLowerCase();
    const set = acSets[acCurrentType];
    if (!set) return;

    acOptions = [...set].filter(val => val.toLowerCase().includes(searchTerm)).sort();
    
    if (acOptions.length === 0) {
      hideAutocomplete();
      return;
    }
    
    acSelectedIndex = -1;
    
    const drop = $('acDropdown');
    drop.innerHTML = acOptions.map((opt, i) => {
      let displayHtml = esc(opt);
      if (searchTerm) {
        const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')})`, 'gi');
        displayHtml = esc(opt).replace(regex, '<mark>$1</mark>');
      }
      return `<div class="ac-item" data-index="${i}">${displayHtml}</div>`;
    }).join('');
    
    const rect = acCurrentTarget.getBoundingClientRect();
    drop.style.top = (rect.bottom + window.scrollY) + 'px';
    drop.style.left = (rect.left + window.scrollX) + 'px';
    drop.style.width = Math.max(rect.width, 150) + 'px';
  }

  function selectAutocompleteOption(index) {
    if (index < 0 || index >= acOptions.length || !acCurrentTarget) return;
    const opt = acOptions[index];
    
    let prefix = '';
    const rawText = acCurrentTarget.innerText || '';
    if (acCurrentType === 'characters' || acCurrentType === 'props') {
      const lastComma = rawText.lastIndexOf(',');
      if (lastComma !== -1) {
        prefix = rawText.substring(0, lastComma + 1) + ' ';
      }
    }
    
    acCurrentTarget.innerText = prefix + opt;
    
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(acCurrentTarget);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
    
    acCurrentTarget.blur(); // Trigger save and render
    hideAutocomplete();
  }

  document.addEventListener('mousedown', e => {
    if (!acVisible) return;
    const item = e.target.closest('.ac-item');
    if (item) {
      e.preventDefault(); // prevent input blur
      selectAutocompleteOption(parseInt(item.dataset.index, 10));
    }
  });

  // ── Event Binding: Table ───────────────────────
  function bindRowEvents() {
    // Contenteditable
    shotBody.querySelectorAll('[contenteditable="true"]').forEach(el => {
      el.addEventListener('focus', () => {
        const field = el.dataset.field;
        if (field === 'characters' || field === 'location' || field === 'props') {
          clearTimeout(acHideTimeout);
          showAutocomplete(el, field);
        }
      });
      el.addEventListener('input', () => {
        if (acVisible && acCurrentTarget === el) filterAutocomplete();
      });
      el.addEventListener('blur', () => {
        const field = el.dataset.field;
        if (field === 'characters' || field === 'location' || field === 'props') {
          acHideTimeout = setTimeout(hideAutocomplete, 150);
        }
        const row = el.closest('tr');
        if (row) {
          const id = row.dataset.id;
          const shot = shots.find(s => s.id === id);
          if (shot) { shot[field] = el.textContent.trim(); save(); render(); }
        }
      });
      el.addEventListener('keydown', e => {
        if (acVisible && acCurrentTarget === el) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            acSelectedIndex = (acSelectedIndex + 1) % acOptions.length;
            Array.from($('acDropdown').children).forEach((child, i) => {
              child.classList.toggle('selected', i === acSelectedIndex);
              if (i === acSelectedIndex) child.scrollIntoView({ block: 'nearest' });
            });
            return;
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            acSelectedIndex = (acSelectedIndex - 1 + acOptions.length) % acOptions.length;
            Array.from($('acDropdown').children).forEach((child, i) => {
              child.classList.toggle('selected', i === acSelectedIndex);
              if (i === acSelectedIndex) child.scrollIntoView({ block: 'nearest' });
            });
            return;
          } else if (e.key === 'Enter') {
            if (acSelectedIndex >= 0) {
              e.preventDefault();
              selectAutocompleteOption(acSelectedIndex);
              return;
            }
          } else if (e.key === 'Escape') {
            hideAutocomplete();
            return;
          }
        }
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
      });
    });

    // Selects (movement, shotSize, lens, blockType — with Custom… support)
    shotBody.querySelectorAll('select[data-field]').forEach(sel => {
      sel.addEventListener('change', () => {
        const row = sel.closest('tr');
        const shot = shots.find(s => s.id === row.dataset.id);
        if (!shot) return;
        const field = sel.dataset.field;

        if (sel.value === '__custom__') {
          const labels = { shotSize: 'Shot Size', lens: 'Lens', movement: 'Movement' };
          const customVal = prompt(`Enter custom ${labels[field] || field}:`);
          if (customVal && customVal.trim()) {
            const trimmed = customVal.trim();
            if (acSets[field]) { acSets[field].add(trimmed); saveAutocomplete(); }
            shot[field] = trimmed;
            save(); render();
          } else {
            sel.value = shot[field] || '';
          }
          return;
        }

        if (field === 'blockType') {
          shot.blockType = sel.value;
          const lbl = row.querySelector('.block-label');
          if (lbl) lbl.style.display = sel.value === 'CUSTOM' ? '' : 'none';
          save(); render();
        } else {
          shot[field] = sel.value;
          save();
        }
      });
    });

    // Duration — normalize raw input ("30"→"00:30", "130"→"01:30", "0030"→"00:30") on blur
    shotBody.querySelectorAll('.duration-input').forEach(inp => {
      inp.addEventListener('blur', () => {
        const row = inp.closest('tr');
        const shot = shots.find(s => s.id === row.dataset.id);
        if (shot) {
          const normalized = normalizeDuration(inp.value.trim());
          shot.duration = normalized;
          inp.value = normalized;
          if (!isValidDuration(normalized)) {
            inp.classList.add('invalid');
          } else {
            inp.classList.remove('invalid');
          }
          save(); render();
        }
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      });
    });

    // Block Label
    shotBody.querySelectorAll('.block-label').forEach(inp => {
      inp.addEventListener('blur', () => {
        const row = inp.closest('tr');
        const shot = shots.find(s => s.id === row.dataset.id);
        if (shot) { shot.label = inp.textContent.trim(); save(); }
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      });
    });

    // Call Time — also normalizes raw 4-digit input on blur
    shotBody.querySelectorAll('.time-input[data-field="callTime"]').forEach(inp => {
      inp.addEventListener('focus', () => {
        if (inp.dataset.inherited === 'true') {
          inp.value = '';
          inp.classList.remove('inherited');
        }
      });
      inp.addEventListener('blur', () => {
        const row = inp.closest('tr');
        const shot = shots.find(s => s.id === row.dataset.id);
        if (shot) {
          const raw = inp.value.trim();
          if (raw === '') {
            shot.callTime = '';
          } else {
            const normalized = normalizeTime(raw);
            if (!isValidTime(normalized)) {
              inp.classList.add('invalid');
              return;
            }
            shot.callTime = normalized;
            inp.value = normalized;
            inp.classList.remove('invalid');
          }
          save(); render();
        }
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      });
    });

    // Priority
    shotBody.querySelectorAll('.priority-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const row = dot.closest('tr');
        const shot = shots.find(s => s.id === row.dataset.id);
        if (shot) {
          const i = PRIORITY_CYCLE.indexOf(shot.priority);
          shot.priority = PRIORITY_CYCLE[(i+1) % PRIORITY_CYCLE.length];
          save(); render();
        }
      });
    });

    // Storyboard — empty: file picker; has image: lightbox
    shotBody.querySelectorAll('.storyboard-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const id = cell.dataset.id;
        if (!id) return; // block rows have no data-id on storyboard cell
        const shot = shots.find(s => s.id === id);
        if (!shot) return;
        if (shot.storyboard) {
          openLightbox(id);
        } else {
          currentStoryboardId = id;
          fileInput.click();
        }
      });
    });

    // Actions
    shotBody.querySelectorAll('.actions-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const row = btn.closest('tr');
        contextRowId = row.dataset.id;
        showContextMenu(e.clientX, e.clientY);
      });
    });

    // Drag & Drop
    shotBody.querySelectorAll('.drag-handle').forEach(handle => {
      handle.addEventListener('mousedown', e => initDrag(e, handle));
      handle.addEventListener('touchstart', e => initTouchDrag(e, handle), { passive: false });
    });

    // Apply responsive preset sizes after render
    applyPresetLayout();
  }

  // ── Event Binding: Cards ───────────────────────
  function bindCardEvents() {
    cardGrid.querySelectorAll('.card-img').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const shot = shots.find(s => s.id === id);
        if (!shot) return;
        if (shot.storyboard) {
          openLightbox(id);
        } else {
          currentStoryboardId = id;
          fileInput.click();
        }
      });
    });

    cardGrid.querySelectorAll('.priority-dot').forEach(dot => {
      dot.addEventListener('click', e => {
        e.stopPropagation();
        const card = dot.closest('.shot-card');
        const shot = shots.find(s => s.id === card.dataset.id);
        if (shot) {
          const i = PRIORITY_CYCLE.indexOf(shot.priority);
          shot.priority = PRIORITY_CYCLE[(i+1) % PRIORITY_CYCLE.length];
          save(); render();
        }
      });
    });

    cardGrid.querySelectorAll('.actions-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        contextRowId = btn.dataset.id;
        showContextMenu(e.clientX, e.clientY);
      });
    });
  }

  // ── Lightbox ───────────────────────────────────
  function getShotLabel(shot) {
    if (!shot) return '';
    const shotNum = shot._shotNum != null ? shot._shotNum : '';
    if (shot.num && shotNum) return `Scene ${shot.num}  /  Shot ${shotNum}`;
    if (shot.num) return `Scene ${shot.num}`;
    return 'Shot';
  }

  function openLightbox(id) {
    // Build ordered list of all shots that have storyboard images, in current
    // rendered (filtered) order. We walk the actual tbody rows so the order
    // matches what the user sees (including group mode, filters, etc.).
    const renderedIds = Array.from(
      shotBody.querySelectorAll('tr[data-id]')
    ).map(tr => tr.dataset.id);

    lbShotIds = renderedIds.filter(rid => {
      const s = shots.find(s => s.id === rid);
      return s && s.storyboard;
    });

    lbIndex = lbShotIds.indexOf(id);
    if (lbIndex === -1) return; // shouldn't happen

    lbRefresh();
    lightbox.classList.add('lb-visible');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('lb-visible');
    document.body.style.overflow = '';
    lbShotIds = [];
    lbIndex = -1;
  }

  function lbRefresh() {
    const id   = lbShotIds[lbIndex];
    const shot = shots.find(s => s.id === id);
    if (!shot) return;

    lbImg.style.opacity = '0';
    // Small tick so the fade-out is visible when navigating
    requestAnimationFrame(() => {
      lbImg.src = shot.storyboard;
      lbImg.onload = () => { lbImg.style.opacity = '1'; };
      // If cached, onload may not fire; force opacity
      if (lbImg.complete) lbImg.style.opacity = '1';
    });

    lbLabel.textContent = getShotLabel(shot);
    lbPrev.classList.toggle('disabled', lbIndex === 0);
    lbNext.classList.toggle('disabled', lbIndex === lbShotIds.length - 1);
    currentStoryboardId = id; // keep in sync for Replace
  }

  function lbNavigate(dir) {
    const next = lbIndex + dir;
    if (next < 0 || next >= lbShotIds.length) return;
    lbIndex = next;
    lbRefresh();
  }

  // Button wiring
  lbClose.addEventListener('click', closeLightbox);
  lbBackdrop.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', e => { e.stopPropagation(); lbNavigate(-1); });
  lbNext.addEventListener('click', e => { e.stopPropagation(); lbNavigate(1); });

  lbReplace.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.click(); // currentStoryboardId already set by lbRefresh
  });

  lbDelete.addEventListener('click', e => {
    e.stopPropagation();
    const id   = lbShotIds[lbIndex];
    const shot = shots.find(s => s.id === id);
    if (!shot) return;
    shot.storyboard = '';
    save(); render();

    // Remove from navigation list
    lbShotIds.splice(lbIndex, 1);
    if (lbShotIds.length === 0) {
      closeLightbox();
    } else {
      lbIndex = Math.min(lbIndex, lbShotIds.length - 1);
      lbRefresh();
    }
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('lb-visible')) return;
    if (e.key === 'Escape')      { closeLightbox(); }
    else if (e.key === 'ArrowLeft')  { lbNavigate(-1); }
    else if (e.key === 'ArrowRight') { lbNavigate(1); }
  });

  // Touch / swipe support
  let lbTouchStartX = null;
  lightbox.addEventListener('touchstart', e => {
    if (e.touches.length === 1) lbTouchStartX = e.touches[0].clientX;
  }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    if (lbTouchStartX === null) return;
    const dx = e.changedTouches[0].clientX - lbTouchStartX;
    lbTouchStartX = null;
    if (Math.abs(dx) < 40) return; // too small — treat as tap
    if (dx < 0) lbNavigate(1);   // swipe left → next
    else         lbNavigate(-1);  // swipe right → prev
  }, { passive: true });

  // ── File Input (Storyboard) ────────────────────
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file || !currentStoryboardId) return;

    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

        const shot = shots.find(s => s.id === currentStoryboardId);
        if (shot) {
          shot.storyboard = dataUrl;
          save();
          render();
          // If lightbox is open (Replace flow), refresh it
          if (lightbox.classList.contains('lb-visible')) {
            openLightbox(currentStoryboardId);
          }
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // ── Context Menu ───────────────────────────────
  function showContextMenu(x, y) {
    contextMenu.style.left = Math.min(x, window.innerWidth - 160) + 'px';
    contextMenu.style.top = Math.min(y, window.innerHeight - 140) + 'px';
    contextMenu.classList.add('visible');
  }

  function hideContextMenu() {
    contextMenu.classList.remove('visible');
    contextRowId = null;
  }

  document.addEventListener('click', hideContextMenu);
  document.addEventListener('contextmenu', e => {
    const row = e.target.closest('tr[data-id]');
    if (row) {
      e.preventDefault();
      contextRowId = row.dataset.id;
      showContextMenu(e.clientX, e.clientY);
    }
  });

  $('cmDuplicate').addEventListener('click', () => {
    if (!contextRowId) return;
    const src = shots.find(s => s.id === contextRowId);
    if (src) {
      const idx = shots.indexOf(src);
      const dup = createShot({ ...src, id: uid(), num: String(shots.length + 1), callTime: '' });
      shots.splice(idx + 1, 0, dup);
      save(); render();
    }
  });

  $('cmInsertAbove').addEventListener('click', () => {
    if (!contextRowId) return;
    const idx = shots.findIndex(s => s.id === contextRowId);
    if (idx >= 0) {
      shots.splice(idx, 0, createShot({ num: String(shots.length + 1) }));
      save(); render();
    }
  });

  $('cmInsertBelow').addEventListener('click', () => {
    if (!contextRowId) return;
    const idx = shots.findIndex(s => s.id === contextRowId);
    if (idx >= 0) {
      shots.splice(idx + 1, 0, createShot({ num: String(shots.length + 1) }));
      save(); render();
    }
  });

  $('cmDelete').addEventListener('click', () => {
    if (!contextRowId) return;
    shots = shots.filter(s => s.id !== contextRowId);
    save(); render();
  });

  // ── Drag & Drop (mouse) ────────────────────────
  function initDrag(e, handle) {
    const row = handle.closest('tr');
    dragSrcId = row.dataset.id;
    row.classList.add('dragging');

    const onMove = e2 => {
      const target = document.elementFromPoint(e2.clientX, e2.clientY);
      const targetRow = target ? target.closest('tr[data-id]') : null;
      shotBody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      if (targetRow && targetRow.dataset.id !== dragSrcId) {
        targetRow.classList.add('drag-over');
      }
    };

    const onUp = e2 => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      row.classList.remove('dragging');
      shotBody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));

      const target = document.elementFromPoint(e2.clientX, e2.clientY);
      const targetRow = target ? target.closest('tr[data-id]') : null;
      if (targetRow && targetRow.dataset.id !== dragSrcId) {
        reorderShots(dragSrcId, targetRow.dataset.id);
      }
      dragSrcId = null;
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  // ── Drag & Drop (touch) ────────────────────────
  function initTouchDrag(e, handle) {
    e.preventDefault();
    const row = handle.closest('tr');
    dragSrcId = row.dataset.id;
    row.classList.add('dragging');

    const onMove = e2 => {
      const touch = e2.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetRow = target ? target.closest('tr[data-id]') : null;
      shotBody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      if (targetRow && targetRow.dataset.id !== dragSrcId) {
        targetRow.classList.add('drag-over');
      }
    };

    const onEnd = e2 => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      row.classList.remove('dragging');
      shotBody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));

      const touch = e2.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetRow = target ? target.closest('tr[data-id]') : null;
      if (targetRow && targetRow.dataset.id !== dragSrcId) {
        reorderShots(dragSrcId, targetRow.dataset.id);
      }
      dragSrcId = null;
    };

    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  function reorderShots(srcId, targetId) {
    const srcIdx = shots.findIndex(s => s.id === srcId);
    const tgtIdx = shots.findIndex(s => s.id === targetId);
    if (srcIdx < 0 || tgtIdx < 0) return;
    const [moved] = shots.splice(srcIdx, 1);
    shots.splice(tgtIdx, 0, moved);
    save(); render();
  }

  // ── Stats ──────────────────────────────────────
  function updateStats() {
    const filtered = getFilteredShots();
    $('statScenes').textContent = filtered.length;
    let totalMin = 0;
    filtered.forEach(s => {
      const d = parseDuration(s.duration);
      if (d > 0) totalMin += d;
    });
    $('statDuration').textContent = formatDuration(totalMin);

    // Wrap time = last end time
    const lastShot = shots[shots.length - 1];
    const lastSched = lastShot ? scheduleMap[lastShot.id] : null;
    const wrapEl = $('statWrap');
    wrapEl.textContent = (lastSched && lastSched.endMin >= 0) ? formatTime(lastSched.endMin) : '--:--';

    // Total overrun (in minutes)
    let totalOverrunMin = 0;
    Object.values(scheduleMap).forEach(sc => { totalOverrunMin += (sc.overrunMin || 0); });
    const overrunEl = $('statOverrun');
    overrunEl.textContent = formatOverrun(totalOverrunMin) || '00:00';
    overrunEl.classList.toggle('overrun-val', totalOverrunMin > 0);

    // Scene Summary Panel
    const panel = $('sceneSummaryPanel');
    if (Object.keys(groupTotals).length > 0) {
      panel.innerHTML = Object.entries(groupTotals)
        .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
        .map(([num, data]) => `<span style="display:inline-flex; align-items:center; gap:4px; padding:2px 6px; border-radius:4px; background:${data.bg}; color:${data.color}; border:1px solid ${data.color}">Sc ${num}: ${formatDuration(data.min)}</span>`)
        .join('');
    } else {
      panel.innerHTML = '<span style="color:var(--text-2)">No numbered scenes.</span>';
    }
  }

  // ── Toolbar & Buttons ──────────────────────────
  $('btnNewProject').addEventListener('click', () => {
    const pid = uid();
    projectsList.unshift({ id: pid, title: 'Untitled Project', updatedAt: Date.now(), count: 0 });
    saveProjects();
    loadProject(pid);
    seedDefaults();
  });

  $('projectGrid').addEventListener('click', e => {
    const delBtn = e.target.closest('.pc-del');
    if (delBtn) {
      e.stopPropagation();
      const id = delBtn.dataset.del;
      if (confirm('Delete this project? This cannot be undone.')) {
        projectsList = projectsList.filter(p => p.id !== id);
        saveProjects();
        localStorage.removeItem('sl-project-' + id);
        if (currentProjectId === id) localStorage.removeItem(LS_LAST_PROJ_KEY);
        renderHome();
      }
      return;
    }
    
    const card = e.target.closest('.project-card');
    if (card) {
      loadProject(card.dataset.id);
    }
  });

  $('btnHome').addEventListener('click', () => {
    save();
    currentProjectId = null;
    localStorage.removeItem(LS_LAST_PROJ_KEY);
    renderHome();
  });

  $('btnToggleSummary').addEventListener('click', () => {
    const p = $('sceneSummaryPanel');
    const isHidden = p.style.display === 'none';
    p.style.display = isHidden ? 'flex' : 'none';
    $('btnToggleSummary').classList.toggle('active', !isHidden);
  });

  $('btnGroupMode').addEventListener('click', () => {
    const idx = GROUP_MODES.indexOf(currentGroupMode);
    currentGroupMode = GROUP_MODES[(idx + 1) % GROUP_MODES.length];
    const btn = $('btnGroupMode');
    if (currentGroupMode === 'none') {
      btn.textContent = '⊞ Group';
      btn.classList.remove('active');
    } else {
      const label = currentGroupMode === 'location' ? 'Location' : currentGroupMode === 'movement' ? 'Movement' : 'Scene';
      btn.textContent = `⊞ Group: ${label}`;
      btn.classList.add('active');
    }
    render();
  });

  $('btnViewToggle').addEventListener('click', () => {
    viewMode = viewMode === 'list' ? 'card' : 'list';
    $('btnViewToggle').textContent = viewMode === 'list' ? '▦ List' : '▥ Cards';
    render();
  });

  $('btnExportCSV').addEventListener('click', exportCSV);

  $('btnThemeToggle').addEventListener('click', () => {
    const root = document.documentElement;
    const current = root.dataset.theme;
    const next = current === 'light' ? '' : 'light';
    if (next) {
      root.dataset.theme = 'light';
      localStorage.setItem(LS_THEME_KEY, 'light');
      document.querySelector('meta[name="color-scheme"]').content = 'light';
    } else {
      delete root.dataset.theme;
      localStorage.setItem(LS_THEME_KEY, 'dark');
      document.querySelector('meta[name="color-scheme"]').content = 'dark';
    }
  });

  // ── Print ──────────────────────────────────────
  $('btnPrint').addEventListener('click', () => {
    $('printTitle').textContent = projectTitle.textContent.trim() || 'Untitled Project';
    $('printDate').textContent  = new Date().toLocaleDateString('en-GB', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
    window.print();
  });
  window.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
      e.preventDefault();
      $('btnPrint').click();
    }
  });

  // Restore theme
  {
    const saved = localStorage.getItem(LS_THEME_KEY);
    if (saved === 'light') {
      document.documentElement.dataset.theme = 'light';
    }
  }

  // Title contenteditable events
  projectTitle.addEventListener('blur', () => { save(); fitTitleFont(); });
  projectTitle.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); projectTitle.blur(); }
  });
  projectTitle.addEventListener('paste', e => {
    // Paste as plain text only
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // ── Add Row ────────────────────────────────────
  $('btnAddRow').addEventListener('click', () => {
    shots.push(createShot({ num: String(shots.filter(s => s.kind !== 'block').length + 1) }));
    save(); render();
    if (viewMode === 'list') {
      tableWrap.scrollTop = tableWrap.scrollHeight;
    } else {
      cardGrid.scrollTop = cardGrid.scrollHeight;
    }
  });

  $('btnAddBlock').addEventListener('click', () => {
    shots.push(createBlock());
    save(); cascadeSchedule(); render();
    if (viewMode === 'list') {
      tableWrap.scrollTop = tableWrap.scrollHeight;
    } else {
      cardGrid.scrollTop = cardGrid.scrollHeight;
    }
  });

  filterLocation.addEventListener('change', render);
  filterCharacter.addEventListener('input', render);
  filterPriority.addEventListener('change', render);

  // ── CSV Export ─────────────────────────────────
  function exportCSV() {
    const headers = ['Scene','Shot','Priority','Location','Description','Character','Shot Size','Lens','Movement','Props','Duration','Call Time','End Time'];
    const rows = shots.map(s => {
      const sched = scheduleMap[s.id] || { callMin: -1, endMin: -1 };
      if (s.kind === 'block') {
        return [
          s.num || '',
          '',
          '',
          `"${(s.label||'').replace(/"/g,'""')}"`,
          `"${(s.notes||'').replace(/"/g,'""')}"`,
          '',
          '',
          '',
          `"${s.blockType}"`,
          '',
          s.duration,
          sched.callMin >= 0 ? formatTime(sched.callMin) : '',
          sched.endMin >= 0 ? formatTime(sched.endMin) : ''
        ];
      }
      return [
        s.num,
        s._shotNum || '',
        s.priority,
        `"${(s.location||'').replace(/"/g,'""')}"`,
        `"${(s.notes||'').replace(/"/g,'""')}"`,
        `"${(s.characters||'').replace(/"/g,'""')}"`,
        s.shotSize || '',
        s.lens || '',
        s.movement || '',
        `"${(s.props||'').replace(/"/g,'""')}"`,
        s.duration,
        sched.callMin >= 0 ? formatTime(sched.callMin) : '',
        sched.endMin >= 0 ? formatTime(sched.endMin) : ''
      ];
    });
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (projectTitle.textContent.trim() || 'shotlist') + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── Render Orchestrator ────────────────────────
  function render() {
    cascadeSchedule();
    renderTimeline();

    if (viewMode === 'list') {
      tableWrap.classList.remove('hidden');
      cardGrid.classList.add('hidden');
      renderTable();
    } else {
      tableWrap.classList.add('hidden');
      cardGrid.classList.remove('hidden');
      renderCards();
    }
  }

  // ── Mobile Swipe-to-Delete ─────────────────────
  let touchStartX = 0;
  let touchRow = null;

  document.addEventListener('touchstart', e => {
    const row = e.target.closest('tr[data-id]');
    if (!row || e.target.closest('.drag-handle')) return;
    touchStartX = e.touches[0].clientX;
    touchRow = row;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!touchRow) return;
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -60) {
      touchRow.style.transform = `translateX(${Math.max(dx, -100)}px)`;
      touchRow.style.transition = 'none';
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!touchRow) return;
    const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
    if (dx < -80) {
      const id = touchRow.dataset.id;
      touchRow.style.transform = 'translateX(-100%)';
      touchRow.style.transition = 'transform .2s';
      setTimeout(() => {
        shots = shots.filter(s => s.id !== id);
        save(); render();
      }, 200);
    } else {
      touchRow.style.transform = '';
      touchRow.style.transition = 'transform .15s';
    }
    touchRow = null;
  }, { passive: true });

  // ── PWA: Manifest ──────────────────────────────
  const manifest = {
    name: 'Shotlister',
    short_name: 'Shotlister',
    description: 'Offline shot list manager for film production',
    start_url: '.',
    display: 'standalone',
    background_color: '#0e0f11',
    theme_color: '#0e0f11',
    icons: [
      {
        src: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="#16181c"/><text x="96" y="120" text-anchor="middle" font-size="96" fill="#6c8cff" font-family="monospace">S</text></svg>`),
        sizes: '192x192',
        type: 'image/svg+xml'
      },
      {
        src: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="64" fill="#16181c"/><text x="256" y="320" text-anchor="middle" font-size="256" fill="#6c8cff" font-family="monospace">S</text></svg>`),
        sizes: '512x512',
        type: 'image/svg+xml'
      }
    ]
  };

  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestUrl;
  document.head.appendChild(link);

  // ── PWA: Service Worker ────────────────────────
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'shotlister-v2';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(cache => cache.addAll([self.registration.scope]))
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          )
        );
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
            const clone = resp.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return resp;
          })).catch(() => new Response('Offline', { status: 503 }))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, { scope: '.' }).catch(e => {
      console.warn('SW registration failed (expected with blob URL in some browsers):', e);
    });
  }

  // ── Init ───────────────────────────────────────
  loadLayout();
  migrateLegacyData();
  loadAutocomplete();
  
  const lastId = localStorage.getItem(LS_LAST_PROJ_KEY);
  if (lastId && projectsList.find(p => p.id === lastId)) {
    loadProject(lastId);
  } else {
    renderHome();
  }

  // ResizeObserver: reflow preset sizes whenever the table container changes size
  new ResizeObserver(() => applyPresetLayout()).observe(tableWrap);

})();
</script>
</body>
</html>

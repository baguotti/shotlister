<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Shotlister — Offline PWA shot list manager for film production">
<title>Shotlister</title>
<script>
{
  const cs = localStorage.getItem('sl-color-scheme');
  if (cs) document.querySelector('meta[name="color-scheme"]').content = cs;
}
</script>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>

<div id="app">

  <!-- ── HOMEPAGE VIEW ── -->
  <div id="homeView" style="display:none; flex:1; overflow-y:auto; padding: 40px; flex-direction:column; background:var(--bg-0);">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:30px;">
      <h1 style="font-family:var(--font-mono); font-size:24px; color:var(--text-1); margin:0;">Shotlister Projects</h1>
      <button class="btn" id="btnNewProject" style="background:var(--accent); color:var(--bg-0); border-color:var(--accent); font-weight:bold;">+ New Project</button>
    </div>
    <div id="projectGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px;"></div>
  </div>

  <!-- ── EDITOR VIEW ── -->
  <div id="editorView" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">

    <!-- Print Header (shown only @media print) -->
    <div class="print-header" id="printHeader">
      <span class="ph-title" id="printTitle"></span>
      <span class="ph-date"  id="printDate"></span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="btn" id="btnHome" style="margin-right:12px;">← Home</button>
      <span class="project-title" id="projectTitle" contenteditable="true" spellcheck="false" role="heading" aria-level="1"></span>
      <div class="spacer"></div>
    <div class="preset-ctrl" id="presetCtrl">
      <button data-preset="S" title="Compact">S</button>
      <button data-preset="M" title="Default" class="active">M</button>
      <button data-preset="L" title="Large">L</button>
      <button data-preset="XL" title="Cinematic">XL</button>
    </div>
    <button class="btn" id="btnGroupMode">⊞ Group</button>
    <button class="btn" id="btnViewToggle">⚙️ Custom</button>
    <button class="btn" id="btnExportCSV">↓ CSV</button>
    <button class="btn" id="btnPrint">⎙ Print</button>
    <button class="btn" id="btnThemeToggle">◐ Theme</button>
  </div>

  <!-- Timeline Bar -->
  <div class="timeline-bar" id="timelineBar">
    <span class="timeline-label">Day</span>
    <div class="timeline-inner" id="timelineInner"></div>
    <span class="timeline-times" id="timelineTimes"></span>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar">
    <label>Filter:</label>
    <select id="filterLocation"><option value="">Location</option></select>
    <input type="text" id="filterCharacter" placeholder="Character…">
    <select id="filterPriority">
      <option value="">Priority</option>
      <option value="off">Off</option>
      <option value="low">Low</option>
      <option value="high">High</option>
    </select>
  </div>

  <!-- Table (list view) -->
  <div class="table-wrap" id="tableWrap">
    <table id="shotTable">
      <thead>
        <tr id="headerRow">
          <th class="col-drag"></th>
          <th class="col-select"><input type="checkbox" id="selectAll" title="Select All"></th>
          <th class="col-storyboard">Board</th>
          <th class="col-num">SCENE</th>
          <th class="col-shotnum">SHOT</th>
          <th class="col-priority">Priority</th>
          <th class="col-location">Location</th>
          <th class="col-notes">Description</th>
          <th class="col-chars">Character</th>
          <th class="col-shotsize">Shot Size</th>
          <th class="col-lens hide-tablet">Lens</th>
          <th class="col-movement">Movement</th>
          <th class="col-props hide-tablet">Props</th>
          <th class="col-duration">Dur</th>
          <th class="col-calltime">Call</th>
          <th class="col-endtime">End</th>
          <th class="col-running hide-tablet">Sum</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="shotBody"></tbody>
    </table>
  </div>

  <!-- Settings View Modal -->
  <dialog class="custom-modal" id="settingsView" style="max-height: 80vh; max-width: 600px;"></dialog>

  <!-- Scene Summary Panel -->
  <div id="sceneSummaryPanel" style="display:none; padding: 8px 12px; background: var(--bg-1); border-top: 1px solid var(--border); overflow-x: auto; white-space: nowrap; font-family: var(--font-mono); font-size: 11px; gap: 8px; align-items: center;"></div>

  <!-- Footer -->
  <div class="footer" id="footer">
    <div class="stat">Scenes: <span class="stat-val" id="statScenes">0</span></div>
    <div class="stat-sep"></div>
    <div class="stat">Shots: <span class="stat-val" id="statShots">0</span></div>
    <div class="stat-sep"></div>
    <div class="stat">Blocks: <span class="stat-val" id="statBlocks">0</span></div>
    <div class="stat-sep"></div>
    <div class="stat">Duration: <span class="stat-val" id="statDuration">00:00</span></div>
    <div class="stat-sep"></div>
    <div class="stat">Wrap: <span class="stat-val" id="statWrap">--:--</span></div>
    <div class="stat">Overrun: <span class="stat-val" id="statOverrun">00:00</span></div>
    <button class="add-row-btn" id="btnToggleSummary" style="margin-left:auto; background:transparent; border-color:transparent; color:var(--text-1);">∑ Summary</button>
    <div class="spacer"></div>
    <button class="add-row-btn" id="btnAddBlock" style="margin-right:8px; background:var(--bg-2); border-color:var(--border); color:var(--text-1);">+ Add Block</button>
    <button class="add-row-btn" id="btnAddRow">+ Add Shot</button>
  </div>

</div> <!-- /editorView -->

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <button id="cmDuplicate">Duplicate</button>
  <button id="cmInsertAbove">Insert Above</button>
  <button id="cmInsertBelow">Insert Below</button>
  <div class="divider"></div>
  <button id="cmDelete" class="danger">Delete</button>
</div>

<!-- Storyboard Lightbox -->
<div id="lightbox">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <div class="lb-header">
    <span class="lb-label" id="lbLabel"></span>
    <button class="lb-close" id="lbClose" title="Close (Esc)">✕</button>
  </div>
  <div class="lb-img-wrap">
    <button class="lb-arrow lb-arrow-prev" id="lbPrev" title="Previous (←)">&#8592;</button>
    <img id="lbImg" src="" alt="Storyboard">
    <button class="lb-arrow lb-arrow-next" id="lbNext" title="Next (→)">&#8594;</button>
  </div>
  <div class="lb-footer">
    <button class="lb-btn lb-btn-replace" id="lbReplace">Replace</button>
    <button class="lb-btn lb-btn-delete" id="lbDelete">Delete</button>
  </div>
</div>

<!-- Bulk Action Bar -->
<div class="bulk-action-bar" id="bulkActionBar">
  <span id="bulkCount">0 selected</span>
  <div class="bulk-divider"></div>
  <button id="btnBulkDuplicate" class="btn">Duplicate</button>
  <button id="btnBulkDelete" class="btn danger">Delete</button>
  <button id="btnBulkClear" class="btn close" title="Clear Selection">✕</button>
</div>

<!-- Hidden file input for storyboard -->
<input type="file" accept="image/*" class="sr-only" id="fileInput">

<!-- Autocomplete Dropdown -->
<div id="acDropdown" class="ac-dropdown"></div>

<!-- Custom Prompt Modal -->
<dialog id="customPromptModal" class="custom-modal">
  <div class="modal-content">
    <h3 id="customPromptTitle">Enter Custom Value</h3>
    <input type="text" id="customPromptInput" autocomplete="off">
    <div class="modal-actions">
      <button id="customPromptCancel" class="btn">Cancel</button>
      <button id="customPromptSubmit" class="btn primary">Submit</button>
    </div>
  </div>
</dialog>

</div> <!-- /app -->

<script type="module" src="/src/main.js"></script>
</body>
</html>
